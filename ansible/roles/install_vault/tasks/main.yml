---
- name: Ensure OS family is Debian
  ansible.builtin.assert:
    that:
      - ansible_facts["os_family"] == "Debian"
    fail_msg: "Role is intended for Debian-based systems."

- name: Install required dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - unzip
    state: present
    update_cache: true

- name: Create keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download HashiCorp GPG key
  ansible.builtin.get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /tmp/hashicorp.gpg
    owner: root
    group: root
    mode: "0644"

- name: Convert HashiCorp GPG key to keyring format
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/hashicorp-archive-keyring.gpg /tmp/hashicorp.gpg
    creates: /etc/apt/keyrings/hashicorp-archive-keyring.gpg

- name: Set permissions on HashiCorp keyring
  ansible.builtin.file:
    path: /etc/apt/keyrings/hashicorp-archive-keyring.gpg
    owner: root
    group: root
    mode: "0644"

- name: Add HashiCorp APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/hashicorp-archive-keyring.gpg]
      https://apt.releases.hashicorp.com
      {{ ansible_facts["distribution_release"] }}
      main
    filename: hashicorp
    state: present
    update_cache: true

- name: Install Vault
  ansible.builtin.apt:
    name: "{{ 'vault=' + vault_version if vault_version | length > 0 else 'vault' }}"
    state: present
    update_cache: true

- name: Create Vault group
  ansible.builtin.group:
    name: "{{ vault_group }}"
    system: true
    state: present

- name: Create Vault user
  ansible.builtin.user:
    name: "{{ vault_user }}"
    group: "{{ vault_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: /etc/vault.d
    create_home: false
    state: present

- name: Create Vault directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ vault_config_dir }}"
      owner: root
      group: "{{ vault_group }}"
      mode: "0750"
    - path: "{{ vault_data_dir }}"
      owner: "{{ vault_user }}"
      group: "{{ vault_group }}"
      mode: "0750"
    - path: "{{ vault_tls_dir }}"
      owner: root
      group: "{{ vault_group }}"
      mode: "0750"

- name: Deploy Vault configuration
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: "{{ vault_config_file }}"
    owner: root
    group: "{{ vault_group }}"
    mode: "0640"
  notify:
    - Restart Vault

- name: Create systemd directory
  ansible.builtin.file:
    path: /etc/systemd/system/vault.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure Vault systemd limits
  ansible.builtin.template:
    src: vault-override.conf.j2
    dest: /etc/systemd/system/vault.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Daemon reload
    - Restart Vault

- name: Activate and start Vault
  ansible.builtin.systemd:
    name: vault
    enabled: true
    state: started
    daemon_reload: true

- name: Verify that Vault is listening on port 8200
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 8200
    timeout: 30

- name: Display post-installation information
  ansible.builtin.debug:
    msg:
      - "Vault is installed and started."
      - "Vault API URL: {{ vault_api_addr }}"
      - "Vault UI URL: {{ vault_api_addr }}/ui"
      - "The backend used is file: {{ vault_data_dir }}"
      - "TLS is disabled in this homelab configuration."
      - "It is now necessary to manually initialize Vault."