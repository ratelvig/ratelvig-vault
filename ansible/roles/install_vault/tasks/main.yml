---
- name: Ensure OS family is Debian
  ansible.builtin.assert:
    that:
      - ansible_facts["os_family"] == "Debian"
    fail_msg: "Role is intended for Debian-based systems."

- name: Install required dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - gnupg
      - python3-cryptography
    state: present
    update_cache: true

- name: Create keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download HashiCorp GPG key
  ansible.builtin.get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /etc/apt/keyrings/hashicorp.asc
    owner: root
    group: root
    mode: "0644"

- name: Convert HashiCorp GPG key to keyring format
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/hashicorp-archive-keyring.gpg /etc/apt/keyrings/hashicorp.asc
    creates: /etc/apt/keyrings/hashicorp-archive-keyring.gpg

- name: Set permissions on HashiCorp keyring
  ansible.builtin.file:
    path: /etc/apt/keyrings/hashicorp-archive-keyring.gpg
    owner: root
    group: root
    mode: "0644"

- name: Add HashiCorp APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/hashicorp-archive-keyring.gpg]
      https://apt.releases.hashicorp.com
      {{ ansible_facts["distribution_release"] }}
      main
    filename: hashicorp
    state: present
    update_cache: true

- name: Install Vault
  ansible.builtin.apt:
    name: "{{ 'vault=' + vault_version if vault_version | length > 0 else 'vault' }}"
    state: present
    update_cache: true

- name: Create Vault group
  ansible.builtin.group:
    name: "{{ vault_group }}"
    system: true
    state: present

- name: Create Vault user
  ansible.builtin.user:
    name: "{{ vault_user }}"
    group: "{{ vault_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: /etc/vault.d
    create_home: false
    state: present

- name: Create Vault directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ vault_config_dir }}"
      owner: root
      group: "{{ vault_group }}"
      mode: "0750"
    - path: "{{ vault_data_dir }}"
      owner: "{{ vault_user }}"
      group: "{{ vault_group }}"
      mode: "0750"
    - path: "{{ vault_tls_dir }}"
      owner: root
      group: "{{ vault_group }}"
      mode: "0750"

- name: Check existing Vault TLS private key
  ansible.builtin.stat:
    path: "{{ vault_tls_key_file }}"
  register: vault_tls_private_key_file

- name: Check existing Vault TLS certificate
  ansible.builtin.stat:
    path: "{{ vault_tls_cert_file }}"
  register: vault_tls_certificate_file

- name: Generate bootstrap Vault TLS private key
  community.crypto.openssl_privatekey:
    path: "{{ vault_tls_key_file }}"
    type: RSA
    size: 4096
    owner: root
    group: "{{ vault_group }}"
    mode: "0640"
  no_log: true
  when: not vault_tls_private_key_file.stat.exists

- name: Generate bootstrap Vault TLS CSR
  community.crypto.openssl_csr:
    path: "{{ vault_tls_dir }}/bootstrap.csr"
    privatekey_path: "{{ vault_tls_key_file }}"
    common_name: "{{ vault_bootstrap_common_name }}"
    subject_alt_name: >-
      {{
        (vault_server_alt_names | default([]) | map('regex_replace', '^', 'DNS:') | list)
        + (vault_server_ip_sans | default([]) | map('regex_replace', '^', 'IP:') | list)
      }}
    owner: root
    group: "{{ vault_group }}"
    mode: "0640"
  when: not vault_tls_certificate_file.stat.exists or not vault_tls_private_key_file.stat.exists

- name: Generate temporary self-signed bootstrap Vault TLS certificate
  community.crypto.x509_certificate:
    path: "{{ vault_tls_cert_file }}"
    csr_path: "{{ vault_tls_dir }}/bootstrap.csr"
    privatekey_path: "{{ vault_tls_key_file }}"
    provider: selfsigned
    selfsigned_not_after: "+{{ vault_bootstrap_cert_ttl_days }}d"
    owner: root
    group: "{{ vault_group }}"
    mode: "0640"
  when: not vault_tls_certificate_file.stat.exists or not vault_tls_private_key_file.stat.exists

- name: Deploy Vault configuration
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: "{{ vault_config_file }}"
    owner: root
    group: "{{ vault_group }}"
    mode: "0640"
  notify:
    - Restart Vault

- name: Create systemd directory
  ansible.builtin.file:
    path: /etc/systemd/system/vault.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure Vault systemd limits
  ansible.builtin.template:
    src: vault-override.conf.j2
    dest: /etc/systemd/system/vault.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Daemon reload
    - Restart Vault

- name: Activate and start Vault
  ansible.builtin.systemd:
    name: vault
    enabled: true
    state: started
    daemon_reload: true

- name: Verify that Vault is listening on port 8200
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 8200
    timeout: 30

- name: Verify that Vault answers over TLS
  ansible.builtin.uri:
    url: "{{ vault_api_addr }}/v1/sys/health"
    method: GET
    status_code: "{{ vault_health_status_codes }}"
    validate_certs: false
  register: vault_tls_health
  retries: 30
  delay: 2
  until: vault_tls_health.status is defined and vault_tls_health.status in vault_health_status_codes

- name: Display post-installation information
  ansible.builtin.debug:
    msg:
      - "Vault is installed and started."
      - "Vault API URL: {{ vault_api_addr }}"
      - "Vault UI URL: {{ vault_api_addr }}/ui"
      - "The backend used is file: {{ vault_data_dir }}"
      - "Vault is listening with TLS from bootstrap."
      - "If this is the first deployment, Vault must now be initialized and unsealed."
